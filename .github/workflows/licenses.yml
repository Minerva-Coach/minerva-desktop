name: Generate Third-Party Licenses

# Generates THIRD_PARTY_LICENSES.md from Cargo.lock and package-lock.json.
# Runs on every push to main + on PR + on a weekly cron, and uploads the
# generated file as an artifact. Also runs as part of release builds (via
# release.yml's build job) so the file ships alongside the binary.
#
# This is the bundled-dependency-attribution side of license compliance:
# our own MIT license covers Minerva-original code, but every linked
# Cargo crate / npm package carries its own license that we must
# reproduce when distributing the binary.
#
# Allowed licenses are listed in `src-tauri/about.toml`. If a new
# dependency introduces a license outside that set, cargo-about fails
# and the dep must be reviewed before merging.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 14 * * 1"  # Mondays at 14:00 UTC, same as audit.yml
  workflow_dispatch:

jobs:
  generate:
    name: Generate THIRD_PARTY_LICENSES.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install cargo-about
        uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3  # v2
        with:
          tool: cargo-about

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm deps (so license-checker can resolve them)
        run: npm ci

      - name: Generate Rust license list
        working-directory: src-tauri
        run: cargo about generate about.hbs > ../rust-licenses.md

      - name: Generate npm license list
        run: |
          npx --yes license-checker --production \
            --csv \
            --out npm-licenses.csv

          {
            echo ""
            echo ""
            echo "---"
            echo ""
            echo "# Third-Party Licenses (npm dependencies)"
            echo ""
            echo "Production npm packages bundled into the desktop app, with"
            echo "their licenses. Generated from \`package-lock.json\`."
            echo ""
            echo "| Package | License | Repository |"
            echo "|---|---|---|"

            # Skip the CSV header, then format each row as a markdown table line.
            # license-checker CSV columns: "module name","licenses","repository","publisher","email"
            tail -n +2 npm-licenses.csv | while IFS=',' read -r module licenses repo _ _; do
              # Strip surrounding quotes that license-checker emits around values.
              module=${module%\"}; module=${module#\"}
              licenses=${licenses%\"}; licenses=${licenses#\"}
              repo=${repo%\"}; repo=${repo#\"}
              echo "| ${module} | ${licenses} | ${repo} |"
            done
          } > npm-licenses.md

      - name: Combine into THIRD_PARTY_LICENSES.md
        run: cat rust-licenses.md npm-licenses.md > THIRD_PARTY_LICENSES.md

      - name: Upload as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: THIRD_PARTY_LICENSES
          path: THIRD_PARTY_LICENSES.md
          if-no-files-found: error
