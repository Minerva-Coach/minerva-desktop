name: Security Scans

# SAST + dependency audits for the Tauri desktop app.
#
# What runs and why:
#   - cargo audit  (Rust dep CVEs)             — analogous to pip-audit for backends
#   - cargo clippy (Rust SAST)                 — analogous to Bandit for Python
#   - npm audit    (frontend dep CVEs)         — front-end dep vulnerability surface
#   - eslint       (TS SAST + security plugin) — front-end SAST
#
# Triggers:
#   - On every PR (no path filter — this whole repo is the desktop app).
#   - Weekly cron, so newly-disclosed CVEs against pinned deps are surfaced
#     even when no PR is open.
#   - Manual via workflow_dispatch.
on:
  pull_request:
  schedule:
    - cron: "0 14 * * 1"  # Mondays at 14:00 UTC (07:00 PT)
  workflow_dispatch:

jobs:
  cargo-audit:
    name: cargo audit (src-tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  cargo-clippy:
    name: cargo clippy (Rust SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-clippy-${{ runner.os }}-

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Run clippy with -D warnings
        working-directory: src-tauri
        run: cargo clippy --no-deps -- -D warnings

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Run npm audit (production deps, fail on high+)
        run: npm audit --audit-level=high --omit=dev

  eslint:
    name: eslint (TS SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
