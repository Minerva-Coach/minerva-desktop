name: Security Scans

# SAST + dependency audits + secret + type checks for the Tauri desktop app.
#
# What runs and why:
#   - cargo audit  (Rust dep CVEs)             — analogous to pip-audit for backends
#   - cargo clippy (Rust SAST)                 — analogous to Bandit for Python
#   - npm audit    (frontend dep CVEs)         — front-end dep vulnerability surface
#   - eslint       (TS SAST + security plugin) — front-end SAST
#   - gitleaks     (secret scan)               — catches accidentally-committed creds
#   - typecheck    (tsc --noEmit)              — catches type errors lint won't
#
# Triggers:
#   - On every PR (no path filter — this whole repo is the desktop app).
#   - Weekly cron, so newly-disclosed CVEs against pinned deps are surfaced
#     even when no PR is open. Cron also runs gitleaks against full history,
#     not just the PR delta.
#   - Manual via workflow_dispatch.
on:
  pull_request:
  schedule:
    - cron: "0 14 * * 1"  # Mondays at 14:00 UTC (07:00 PT)
  workflow_dispatch:

jobs:
  cargo-audit:
    name: cargo audit (src-tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  cargo-clippy:
    name: cargo clippy (Rust SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-clippy-${{ runner.os }}-

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Run clippy with -D warnings
        working-directory: src-tauri
        run: cargo clippy --no-deps -- -D warnings

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Run npm audit (production deps, fail on high+)
        run: npm audit --audit-level=high --omit=dev

  eslint:
    name: eslint (TS SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history so we can either delta against the PR base
          # (PR runs) or scan the whole tree (cron runs).
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        # PR runs: delta only — historical findings are tracked separately
        # and shouldn't block unrelated PRs.
        # Cron / workflow_dispatch: full history scan — catches anything
        # that drifted in or that we want re-scanned against the latest
        # gitleaks ruleset.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE_REF" --depth=1
            RANGE="origin/${BASE_REF}..HEAD"
            echo "Scanning PR delta: $RANGE"
            gitleaks detect \
              --source . \
              --redact \
              --no-banner \
              --verbose \
              --log-opts="$RANGE"
          else
            echo "Scanning full history"
            gitleaks detect \
              --source . \
              --redact \
              --no-banner \
              --verbose
          fi
