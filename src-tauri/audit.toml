# cargo-audit configuration. Read by `cargo audit` and the
# rustsec/audit-check GitHub Action (.github/workflows/desktop-audit.yml).
#
# Each ignore below is a temporary suppression for an advisory that
# cannot be fixed in place from our Cargo.toml — the vulnerable crate
# is a transitive dep capped by a constraint in a parent crate we
# don't own. The right fix in each case is to bump the parent.

[advisories]
ignore = [
    # glib < 0.20 — VariantStrIter unsoundness (medium).
    # Capped by gtk-rs 0.18 ecosystem (gdk, gio, pango, webkit2gtk, wry).
    # Linux-only build path; we don't iterate VariantStr anywhere.
    # Remove once tauri/wry move to gtk-rs 0.20.
    "RUSTSEC-2024-0429",

    # rand 0.7.3 — unsound rng() with custom logger (low).
    # Constrained to ^0.7 by a transitive parent. We bumped rand 0.8.5 -> 0.8.6
    # (the only branch we control); 0.7.3 will linger until its parent bumps.
    # Remove once no `rand` v0.7.x remains in `cargo tree`.
    "RUSTSEC-2026-0097",

    # quick-xml 0.38.4 — quadratic-time attribute-dedup check, a CPU-exhaustion
    # DoS when parsing untrusted XML with many duplicate attribute names.
    # Pulled in via `plist`, pinned by tauri/tauri-codegen/tauri-plugin's own
    # Cargo.toml; `cargo update -p quick-xml` confirms 0.38.4 is already the
    # newest version tauri's pin allows (patched version is >=0.41.0).
    # Not exploitable here: plist is only used for build-time macOS
    # Info.plist generation from our own trusted config, never for parsing
    # attacker-controlled XML at runtime.
    # Remove once tauri bumps its plist dependency past quick-xml 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
