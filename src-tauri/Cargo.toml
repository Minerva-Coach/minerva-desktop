[package]
name = "minerva-desktop"
version = "0.1.2"
description = "Minerva Coach Desktop Overlay"
authors = ["Minerva"]
edition = "2021"

[lib]
name = "minerva_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.33"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["full"] }
tiny_http = "0.12"
url = "2"
log = "0.4"
env_logger = "0.11"
rand = "0.9"
keyring = { version = "3", features = ["linux-native"] }
open = "5"
rust_socketio = { version = "0.6", features = ["async"] }
native-tls = "0.2"

[profile.release]
strip = true
lto = true
codegen-units = 1
